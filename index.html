<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0f" />
<title>背单词 · 短视频流</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lobster&family=Lora:ital,wght@0,400;0,600;1,400;1,600;1,700&family=Noto+Serif+SC:wght@700;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0d1620 url('bkgrd.jpg')
                center/cover fixed no-repeat;
    color: #ffffff;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
  }
  body {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1;
    background:
      linear-gradient(180deg,
        rgba(13, 22, 32, 0.55) 0%,
        rgba(13, 22, 32, 0.65) 50%,
        rgba(13, 22, 32, 0.78) 100%);
  }

  /* ============ Header ============ */
  header {
    position: relative; z-index: 20;
    background: transparent;
    padding: 18px 20px 16px;
    padding-top: calc(max(14px, env(safe-area-inset-top)) + 100px);
    border: none;
  }

  .title-row {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  header h1 {
    margin: 0;
    font-family: "Noto Serif SC", "Source Han Serif SC", "PingFang SC", "Microsoft YaHei", serif;
    font-size: 28px;
    font-weight: 900;
    line-height: 1.1;
    display: flex; align-items: center; gap: 10px;
    color: #ffffff;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #ffffff 0%, #ffe9c2 45%, #ffc98a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
      0 2px 6px rgba(0, 0, 0, 0.35),
      0 0 18px rgba(255, 220, 170, 0.25);
    filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.35));
  }
  header h1::before {
    content: "✦";
    font-family: "Noto Serif SC", serif;
    font-size: 18px;
    font-weight: 900;
    color: #ffd9a8;
    -webkit-text-fill-color: #ffd9a8;
    opacity: 0.95;
    text-shadow: 0 0 10px rgba(255, 217, 168, 0.45);
  }
  header h1 .brand-zh {
    letter-spacing: 4px;
  }
  header h1 .brand-en {
    margin-left: 6px;
    font-family: "Lora", "Times New Roman", serif;
    font-style: italic;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.5px;
  }
  .header-actions { display: flex; gap: 6px; align-items: center; }
  .immerse-btn {
    background: transparent;
    border: none;
    padding: 6px;
    color: #ffffff;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform 0.15s, opacity 0.15s;
    opacity: 0.9;
  }
  .immerse-btn:hover { opacity: 1; }
  .immerse-btn:active { transform: scale(0.88); }
  .immerse-btn svg {
    display: block;
    filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.4));
  }

  /* Progress */
  .progress-bar {
    margin-top: 8px;
    display: flex; gap: 10px; align-items: center;
    font-size: 11px;
  }
  .progress-track {
    flex: 1;
    height: 5px;
    background: rgba(0,0,0,0.06);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #34c759, #5ce1a4);
    width: 0%; transition: width 0.5s ease;
  }
  .progress-text { color: #6b6b72; min-width: 70px; text-align: right; }

  .search-box {
    margin-top: 10px;
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,0,0,0.04);
    border-radius: 10px;
    padding: 7px 12px;
  }
  .search-box input {
    flex: 1; background: transparent; border: none; outline: none;
    color: #1a1a1f; font-size: 13.5px;
  }
  .search-box input::placeholder { color: #9a9aa0; }
  .search-icon { color: #8e8e93; font-size: 13px; }

  .tabs {
    display: flex; gap: 6px;
    margin-top: 10px; overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 14px;
    font-size: 12px;
    color: #5a5a62;
    background: rgba(0,0,0,0.04);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active {
    background: #1a1a1f; color: #fff; font-weight: 600;
  }

  /* ============ Feed (响应式: 手机单列, 平板自动多列并拉伸) ============ */
  .feed {
    --card-min: 360px;
    position: relative;
    display: flex;
    flex-direction: column-reverse;
    justify-content: flex-start;
    gap: 8px;
    padding: 200px max(12px, calc((100% - 1200px) / 2)) 20px;
    margin-top: -200px;
    background: transparent;
    touch-action: pan-y;
  }
  .feed > .card { position: relative; z-index: 2; }
  .feed > .empty { position: relative; z-index: 2; }
  @media (min-width: 640px) {
    .feed {
      gap: 10px;
      padding: 4px max(16px, calc((100% - 1200px) / 2)) 24px;
    }
  }
  .feed .card {
    width: 100%;
  }

  footer {
    position: relative;
    z-index: 5;
    background: rgba(13, 22, 32, 0.16);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    width: 100%;
  }
  .card {
    width: 100%;
    background: transparent;
    border-radius: 12px;
    overflow: hidden;
    border: none;
    display: flex; flex-direction: column;
    position: relative;
    animation: fadeIn 0.35s ease both;
    transition: transform 0.15s;
    color: #ffffff;
  }
  .card > * { position: relative; }
  .card:active { transform: scale(0.985); }
  .card.learned { opacity: 0.5; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-body {
    display: flex;
    gap: 10px;
    padding: 8px 10px;
    align-items: stretch;
  }
  .card-main {
    flex: 1 1 auto;
    min-width: 0;
    display: flex; flex-direction: column;
  }
  .card-main .sentence { flex: 1; }

  .word-line {
    display: flex; align-items: center; gap: 6px;
    width: 100%;
  }
  .word {
    font-family: "Lora", Georgia, serif;
    font-style: italic;
    font-size: 30px; font-weight: 700;
    color: #ffffff; letter-spacing: -0.5px;
    line-height: 1.08;
    flex: 0 1 auto;
    min-width: 0;
    word-break: break-word;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
  }
  .icon-btn {
    background: transparent;
    border: none;
    padding: 0;
    width: 28px; height: 28px;
    flex: 0 0 28px;
    border-radius: 0;
    color: rgba(255, 255, 255, 0.85);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: color 0.15s, opacity 0.15s, transform 0.15s;
  }
  .icon-btn:hover { color: #ffffff; }
  .icon-btn:active { transform: scale(0.88); }
  .icon-btn svg { display: block; }
  .icon-btn.active { color: #ffd60a; }
  .icon-btn.learned-btn.active { color: #34c759; }
  .speak-btn {
    background: transparent;
    border: none;
    padding: 0;
    width: 28px; height: 28px;
    color: rgba(255, 255, 255, 0.85);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .word-line .speak-btn {
    flex: 0 0 28px;
    margin-left: 0;
  }
  .word-line .learned-btn {
    flex: 0 0 28px;
    margin-left: auto;
  }
  .speak-btn:active { transform: scale(0.88); }
  .speak-btn svg { display: block; }

  /* 视频：底部横向小卡片（封面 + 标题/来源） */
  .video-link {
    text-decoration: none; color: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 2px 10px 6px;
    padding: 2px 4px;
    border-radius: 6px;
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.08);
    align-self: flex-start;
    max-width: calc(100% - 20px);
  }
  .cover-wrap {
    position: relative;
    flex: 0 0 20px;
    width: 20px;
    height: 20px;
    border-radius: 3px;
    overflow: hidden;
    background: linear-gradient(135deg, #d8d8de, #c8c8d0);
  }
  .video-info {
    flex: 0 1 auto;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .video-source {
    flex-shrink: 0;
    font-size: 9px;
    color: rgba(255, 255, 255, 0.55);
    line-height: 1.2;
  }
  .cover-wrap.loading::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(90deg, #d8d8de 0%, #e8e8ee 50%, #d8d8de 100%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .video-cover {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    opacity: 0; transition: opacity 0.3s;
  }
  .video-cover.loaded { opacity: 1; }
  .play-svg {
    position: absolute;
    top: 50%; left: 50%;
    width: 60%; height: 60%;
    transform: translate(-50%, -50%);
    color: #fff;
    pointer-events: none;
    opacity: 0.6;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }
  .play-svg svg { width: 100%; height: 100%; display: block; }
  .video-link:hover .play-svg,
  .slide-video:hover .play-svg { transform: translate(-50%, -50%) scale(1.12); opacity: 0.85; }
  /* 封面底部一层 20% 黑色阴影 */
  .cover-wrap::after {
    content: "";
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 50%;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0));
    pointer-events: none;
  }
  .cover-wrap.loading::after { display: none; }
  .video-title {
    font-size: 11px; line-height: 1.25;
    color: #fff; font-weight: 500;
    display: -webkit-box; -webkit-line-clamp: 1;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  .meaning {
    font-size: 12px; color: #ffffff;
    margin-top: 3px; font-weight: 500;
    line-height: 1.3;
    opacity: 0.92;
  }

  .sentence {
    padding: 0;
    margin-top: 3px;
    font-size: 11.5px; line-height: 1.4;
  }
  .sentence .en {
    color: #ffffff; font-weight: 500;
    opacity: 0.88;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .hl {
    color: #ffe88a; font-weight: 700;
    background: rgba(255, 214, 10, 0.25);
    padding: 0 3px; border-radius: 3px;
  }
  /* 翻译遮罩 - 鼓励先想 */
  .cn-wrap {
    position: relative;
    margin-top: 2px;
    cursor: pointer;
    user-select: none;
    min-height: 15px;
  }
  .cn {
    color: #ffffff; font-size: 11px;
    opacity: 0.72;
    transition: filter 0.25s;
    filter: blur(5px);
    display: -webkit-box; -webkit-line-clamp: 1;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .cn-wrap.revealed .cn {
    filter: blur(0);
    -webkit-line-clamp: 2;
  }
  .cn-hint {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: flex-start;
    font-size: 9.5px; color: rgba(255, 255, 255, 0.55);
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .cn-wrap.revealed .cn-hint { opacity: 0; }

  .empty { text-align: center; padding: 60px 20px; color: rgba(255, 255, 255, 0.6); grid-column: 1 / -1; }
  .empty .icon { font-size: 36px; margin-bottom: 8px; }
  .empty .text { font-size: 13px; }

  footer {
    color: rgba(255, 255, 255, 0.5); font-size: 11px;
    padding: 12px 16px calc(30px + env(safe-area-inset-bottom));
  }
  /* 底部操作按钮区域（迁自 douyin_frame.html） */
  .bottom-actions {
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  /* 三段式横向滑动控件（仅切换 main 单词集，不展示卡片内容） */
  .card-pager {
    position: relative;
    width: 100%;
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    touch-action: pan-y;
  }
  .pager-swipe {
    position: absolute;
    inset: 0;
    touch-action: none;
    cursor: grab;
    z-index: 1;
  }
  .pager-swipe:active { cursor: grabbing; }
  .pager-bars { position: relative; z-index: 2; touch-action: none; }
  .pager-bars {
    display: flex;
    justify-content: center;
    gap: 6px;
  }
  .pager-bars > button {
    width: 22px;
    height: 3px;
    border: none;
    border-radius: 2px;
    background: rgba(255,255,255,0.3);
    padding: 0;
    cursor: pointer;
    transition: background 0.2s, width 0.2s;
  }
  .pager-bars > button.active {
    background: #fff;
    width: 32px;
  }
  .bottom-actions > * { pointer-events: auto; }
  .action-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }
  .action-btn {
    flex: 1;
    height: 42px;
    border-radius: 21px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: rgba(255, 255, 255, 0.07);
    color: rgba(255, 255, 255, 0.86);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    transition: transform 0.15s, background 0.2s, border-color 0.2s, color 0.2s;
  }
  .action-btn svg {
    flex: 0 0 auto;
    display: block;
    opacity: 0.9;
  }
  .action-btn.primary {
    background: rgba(255, 255, 255, 0.14);
    color: #fff;
    border-color: rgba(255, 255, 255, 0.28);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.16),
      0 8px 22px rgba(0,0,0,0.16);
  }
  .action-btn:hover { background: rgba(255, 255, 255, 0.12); color: #fff; }
  .action-btn.primary:hover { background: rgba(255, 255, 255, 0.2); }
  .action-btn:active { transform: scale(0.97); }
  .action-btn:disabled {
    opacity: 0.65;
    cursor: default;
  }
  .swipe-hint {
    position: absolute;
    left: 50%;
    bottom: calc(8px + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    text-align: center;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    white-space: nowrap;
    animation: footer-swipe-bob 1.6s ease-in-out infinite;
  }
  @keyframes footer-swipe-bob {
    0%, 100% { transform: translate(-50%, 0); opacity: 0.7; }
    50% { transform: translate(-50%, -3px); opacity: 1; }
  }

  .toast {
    position: fixed; left: 50%; bottom: 80px;
    transform: translateX(-50%) translateY(20px);
    background: rgba(255,255,255,0.95);
    color: #0a0a0f;
    padding: 8px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    opacity: 0; pointer-events: none;
    transition: all 0.25s; z-index: 60;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ============ 沉浸式滑动模式 ============ */
  .immerse {
    position: fixed; inset: 0; z-index: 50;
    background: #000;
    display: none;
    flex-direction: column;
  }
  .immerse.open { display: flex; }
  .immerse-header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
    z-index: 5;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(0,0,0,0.6), transparent);
  }
  .close-btn {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
  }
  .immerse-pos {
    color: #fff; font-size: 13px; font-weight: 500;
    background: rgba(0,0,0,0.4);
    padding: 6px 12px; border-radius: 14px;
  }
  .immerse-scroll {
    flex: 1;
    overflow-y: auto;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
  }
  .immerse-scroll::-webkit-scrollbar { display: none; }
  .slide {
    height: 100dvh;
    width: 100%;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 80px 24px 100px;
    position: relative;
    overflow: hidden;
  }
  .slide::before {
    content: ""; position: absolute; inset: 0;
    background: var(--grad);
    opacity: 0.85; z-index: 0;
  }
  .slide::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.25) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.7) 100%);
    z-index: 1;
  }
  .slide > * { position: relative; z-index: 2; }
  .slide .word {
    font-size: 56px; font-weight: 700;
    letter-spacing: -1px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.4);
    word-break: break-word;
  }
  .slide .word-meta { margin-top: 8px; gap: 12px; }
  .slide .phonetic { font-size: 14px; }
  .slide .speak-btn { width: 30px; height: 30px; font-size: 14px; }
  .slide .meaning {
    font-size: 17px; margin-top: 14px;
    font-weight: 600;
  }
  .slide-sentence {
    margin-top: 28px;
    font-size: 16px; line-height: 1.6;
  }
  .slide-sentence .en { color: #fff; }
  .slide-sentence .cn {
    color: rgba(255,255,255,0.85);
    font-size: 14px; margin-top: 8px;
    transition: filter 0.25s; filter: blur(8px);
  }
  .slide-sentence.revealed .cn { filter: blur(0); }
  .slide-sentence .hl {
    background: rgba(255,214,10,0.3);
    color: #fff7c2;
  }
  .slide-video {
    position: absolute;
    bottom: calc(24px + env(safe-area-inset-bottom));
    left: 16px; right: 16px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px;
    display: flex; align-items: center; gap: 10px;
    text-decoration: none; color: #fff;
    z-index: 3;
  }
  .slide-video .cover-wrap { width: 54px; height: 54px; }
  .slide-video .video-title { font-size: 13px; color: #fff; }
  .slide-video .video-source { color: rgba(255,255,255,0.65); }

  .slide-actions {
    position: absolute;
    right: 14px;
    bottom: calc(110px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 14px;
    z-index: 4;
  }
  .slide-actions button {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    width: 46px; height: 46px; border-radius: 50%;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .slide-actions button.active { background: #ffd60a; color: #0a0a0f; border-color: #ffd60a; }
  .slide-actions button.learned-btn.active { background: #34c759; color: #fff; border-color: #34c759; }

  .hint-swipe {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    animation: bob 1.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes bob {
    0%, 100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -6px); }
  }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1><span class="brand-zh">流光知</span></h1>
    <div class="header-actions">
      <button class="immerse-btn" id="openImmerse" aria-label="沉浸模式" hidden style="display:none;">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 9 V4 H9"></path>
          <path d="M20 9 V4 H15"></path>
          <path d="M4 15 V20 H9"></path>
          <path d="M20 15 V20 H15"></path>
        </svg>
      </button>
    </div>

  const PAGER_SIZE = 3;

  function getFiltered() {
    let list = WORDS;
    const levelFilters = ['CET4','CET6','IELTS'];
    if (currentFilter === 'starred') list = list.filter(w => state.starred.includes(w.word));
    else if (currentFilter === 'learned') list = list.filter(w => state.learned.includes(w.word));
    else if (currentFilter === 'unlearned') list = list.filter(w => !state.learned.includes(w.word));
    else if (levelFilters.includes(currentFilter)) list = list.filter(w => w.level === currentFilter);
    // pager 分页：每页固定显示 PAGER_SIZE 个，根据 pagerIdx 取对应页
    const total = getPagerTotal(list.length);
    if (pagerIdx >= total) pagerIdx = total - 1;
    const start = pagerIdx * PAGER_SIZE;
    list = list.slice(start, start + PAGER_SIZE);
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      list = list.filter(w =>
        w.word.toLowerCase().includes(q) ||
        w.meaning.toLowerCase().includes(q) ||
        w.en.toLowerCase().includes(q)

    }
    return list;
  }

    const videoIndex = getLocalVideoIndex(link.getAttribute('href') || '');
    if (videoIndex === null) return false;
    if (window.parent && window.parent !== window) {
      event.preventDefault();
      window.parent.postMessage({ type: 'douyin-demo:open-video', videoIndex }, '*');
      return true;
    }
    return false;
  }

  function cardHTML(w) {
    const starred = state.starred.includes(w.word);
    const learned = state.learned.includes(w.word);
    const grad = hashGrad(w.word);
    return `
      <article class="card ${learned ? 'learned' : ''}" style="--grad: ${grad}" data-word="${escapeHtml(w.word)}">
        <div class="card-body">
          <div class="card-main">
            <div class="word-line">
              <div class="word">${escapeHtml(w.word)}</div>
              <button class="icon-btn speak-btn" data-act="speak" data-word="${escapeHtml(w.word)}" aria-label="朗读" title="朗读">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M4 9v6h4l5 4V5L8 9H4z"></path>
                  <path d="M16 9.5a4 4 0 0 1 0 5"></path>
                  <path d="M18.5 7a7.5 7.5 0 0 1 0 10"></path>
                </svg>
              </button>
              <button class="icon-btn learned-btn ${learned ? 'active' : ''}" data-act="learn" data-word="${escapeHtml(w.word)}" aria-label="已学会" title="已学会">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="12" cy="12" r="9"></circle>
                  <path d="M8 12.2l2.5 2.5L16.5 9"></path>
                </svg>
              </button>
              <button class="icon-btn ${starred ? 'active' : ''}" data-act="star" data-word="${escapeHtml(w.word)}" aria-label="收藏" title="收藏">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="${starred ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M12 2.8l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 17.6l-5.8 3.1 1.1-6.5-4.7-4.6 6.5-.9L12 2.8z"></path>
                </svg>
              </button>
            </div>
            <div class="meaning">${escapeHtml(w.meaning)}</div>
            <div class="sentence">
              <div class="en">${highlight(escapeHtml(w.en), w.word)}</div>
              <div class="cn-wrap" data-act="reveal">
                <div class="cn">${escapeHtml(w.cn)}</div>
                <div class="cn-hint">点击显示翻译</div>
              </div>
            </div>
          </div>
        </div>
        <a class="video-link" href="${w.url}" target="${videoTarget(w)}" rel="noopener">
          <div class="cover-wrap loading">
            <img class="video-cover" src="${w.cover}" alt="" loading="lazy"
                 onload="this.classList.add('loaded');this.parentNode.classList.remove('loading')"
                 onerror="this.parentNode.classList.remove('loading')" />
            <span class="play-svg" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="rgba(0,0,0,0.55)" stroke-width="0.8" stroke-linejoin="round"><polygon points="8 5 19 12 8 19 8 5"/></svg>
            </span>
          </div>
          <div class="video-info">
            <div class="video-title">${escapeHtml(w.videoTitle)}</div>
            <div class="video-source">${videoMetaText(w)}</div>
          </div>
        </a>
      </article>`;
  }

  function render() {
    const feed = document.getElementById('feed');
    const list = getFiltered();
    updateProgress();

    if (list.length === 0) {
      feed.innerHTML = `<div class="empty"><div class="icon">🔍</div><div class="text">没有匹配的单词</div></div>`;
      document.getElementById('footer').style.display = 'none';
      return;
    }
    document.getElementById('footer').style.display = '';
    feed.innerHTML = list.map(cardHTML).join('');
  }

  // 事件代理 - feed
  document.getElementById('feed').addEventListener('click', e => {
    if (openLocalVideoFromCard(e)) return;

    const reveal = e.target.closest('[data-act="reveal"]');
    if (reveal) { reveal.classList.toggle('revealed'); vibe(5); return; }

    const t = e.target.closest('[data-act]');
    if (!t) return;
    const act = t.dataset.act;
    const word = t.dataset.word;
    if (act === 'speak') { e.preventDefault(); e.stopPropagation(); speak(word); }
    else if (act === 'star') { e.preventDefault(); e.stopPropagation(); toggleStar(word); }
    else if (act === 'learn') { e.preventDefault(); e.stopPropagation(); toggleLearned(word); }
  });

  document.getElementById('tabs')?.addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    render();
  });

  document.getElementById('searchInput')?.addEventListener('input', e => {
    currentSearch = e.target.value.trim();
    render();
  });

  // ============ 沉浸式模式 ============
  function slideHTML(w, idx) {
    const starred = state.starred.includes(w.word);
    const learned = state.learned.includes(w.word);
    const grad = hashGrad(w.word);
    return `
      <section class="slide" style="--grad: ${grad}" data-word="${escapeHtml(w.word)}" data-idx="${idx}">
        <div class="word">${escapeHtml(w.word)}</div>
        <div class="word-meta">
          <span class="phonetic">${escapeHtml(w.phonetic)}</span>
          <button class="speak-btn" data-act="speak" data-word="${escapeHtml(w.word)}">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 9v6h4l5 4V5L8 9H4z"></path>
              <path d="M16 9.5a4 4 0 0 1 0 5"></path>
              <path d="M18.5 7a7.5 7.5 0 0 1 0 10"></path>
            </svg>
          </button>
        </div>
        <div class="meaning">${escapeHtml(w.meaning)}</div>
        <div class="slide-sentence" data-act="reveal">
          <div class="en">${highlight(escapeHtml(w.en), w.word)}</div>
          <div class="cn">${escapeHtml(w.cn)}　<span style="font-size:11px;opacity:.6;">(点击切换)</span></div>
        </div>
        <div class="slide-actions">
          <button data-act="star" data-word="${escapeHtml(w.word)}" class="${starred ? 'active' : ''}">${starred ? '★' : '☆'}</button>
          <button data-act="learn" data-word="${escapeHtml(w.word)}" class="learned-btn ${learned ? 'active' : ''}">${learned ? '✓' : '○'}</button>
        </div>
        <a class="slide-video" href="${w.url}" target="${videoTarget(w)}" rel="noopener">
          <div class="cover-wrap loading">
            <img class="video-cover" src="${w.cover}" alt="" loading="lazy"
                 onload="this.classList.add('loaded');this.parentNode.classList.remove('loading')" />
            <span class="play-svg" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="rgba(0,0,0,0.55)" stroke-width="0.8" stroke-linejoin="round"><polygon points="8 5 19 12 8 19 8 5"/></svg>
            </span>
          </div>
          <div class="video-info">
            <div class="video-title">${escapeHtml(w.videoTitle)}</div>
            <div class="video-source">${videoMetaText(w)}</div>
          </div>
        </a>
        ${idx === 0 ? '<div class="hint-swipe">⬆ 上滑切换下一个</div>' : ''}
      </section>`;
  }

  function refreshImmerseSlide(word) {
    const im = document.getElementById('immerse');
    if (!im.classList.contains('open')) return;
    const slide = im.querySelector(`.slide[data-word="${CSS.escape(word)}"]`);
    if (!slide) return;
    const starBtn = slide.querySelector('[data-act="star"]');
    const learnBtn = slide.querySelector('[data-act="learn"]');
    if (starBtn) {
      const s = state.starred.includes(word);
      starBtn.classList.toggle('active', s);
      starBtn.textContent = s ? '★' : '☆';
    }
    if (learnBtn) {
      const l = state.learned.includes(word);
      learnBtn.classList.toggle('active', l);
      learnBtn.textContent = l ? '✓' : '○';
    }
  }

  function openImmerse() {
    const list = getFiltered();
    if (!list.length) { showToast('没有可学习的单词'); return; }
    const scroll = document.getElementById('immerseScroll');
    scroll.innerHTML = list.map((w, i) => slideHTML(w, i)).join('');
    document.getElementById('immerse').classList.add('open');
    document.body.style.overflow = 'hidden';
    updateImmersePos(0, list.length);
    speak(list[0].word);

    // 滚动监听 - 更新位置 + 自动朗读
    let timer = null;
    scroll.onscroll = () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        const idx = Math.round(scroll.scrollTop / window.innerHeight);
        updateImmersePos(idx, list.length);
        if (list[idx]) { vibe(5); speak(list[idx].word); }
      }, 120);
    };
  }
  function closeImmerse() {
    document.getElementById('immerse').classList.remove('open');
    document.body.style.overflow = '';
    speechSynthesis.cancel();
  }
  function updateImmersePos(i, total) {
    const el = document.getElementById('immersePos');
    if (el) el.textContent = `${i + 1} / ${total}`;
  }

  document.getElementById('openImmerse')?.addEventListener('click', openImmerse);
  document.getElementById('closeImmerse')?.addEventListener('click', closeImmerse);
  function openWordLibrary() {
    const target = 'word_swipe_library.html';
    // 嵌在 iframe 里：通过 postMessage 通知父页面做整页跳转
    if (window.parent && window.parent !== window) {
      try {
        window.parent.postMessage({ type: 'douyin-demo:navigate', target }, '*');
      } catch (_) {}
      // 兜底：父窗口同源时直接接管跳转；不同源则在 iframe 内自跳
      try {
        setTimeout(() => {
          if (window.top && window.top !== window) window.top.location.href = target;
          else window.location.href = target;
        }, 150);
      } catch (_) {
        setTimeout(() => { window.location.href = target; }, 150);
      }
      return;
    }
    window.location.href = target;
  }
  document.getElementById('viewDetailBtn')?.addEventListener('click', openWordLibrary);
  document.getElementById('notInterestedBtn')?.addEventListener('click', (e) => {
    const btn = e.currentTarget;
    const label = btn.querySelector('span');
    const old = label.textContent;
    label.textContent = '已减少类似推荐';
    btn.disabled = true;
    setTimeout(() => { label.textContent = old; btn.disabled = false; }, 1500);
  });

  // 三段横向滑动控件（切换 main 单词集；同时支持手势滑动和点击横条）
  (function initCardPager() {
    const swipe = document.getElementById('cardPagerSwipe');
    const bars = document.getElementById('cardPagerBars');
    if (!swipe || !bars) return;
    const PAGER_TOTAL = getPagerTotal(WORDS.length);
    bars.innerHTML = Array.from({ length: PAGER_TOTAL }, (_, i) =>
      `<button data-idx="${i}" class="${i === pagerIdx ? 'active' : ''}" aria-label="第 ${i + 1} 段"></button>`
    ).join('');
    const barEls = Array.from(bars.children);
    function setIdx(i) {
      const next = Math.max(0, Math.min(PAGER_TOTAL - 1, i));
      if (next === pagerIdx) return;
      pagerIdx = next;
      barEls.forEach((b, idx) => b.classList.toggle('active', idx === pagerIdx));
      render();
      const main = document.querySelector('main.feed');
      if (main) main.scrollTop = 0;
    }

    // 点击横条切换
    bars.addEventListener('click', (e) => {
      const b = e.target.closest('button[data-idx]');
      if (!b) return;
      setIdx(+b.dataset.idx);
    });

    // 手势：鼠标拖动 + 触摸滑动，超过阈值则切换
    const THRESHOLD = 40;
    const pagerRoot = document.getElementById('cardPager') || swipe;
    const feedRoot = document.getElementById('feed');
    let startX = null;
    let startY = null;
    let swiping = false;
    let swipeSource = null;
    function start(x, y) {
      startX = x; startY = y; swiping = false;
    }
    function move(x, y, ev) {
      if (startX === null) return;
      const dx = x - startX;
      const dy = y - startY;
      if (!swiping && Math.abs(dx) > 8 && Math.abs(dx) > Math.abs(dy)) {
        swiping = true;
      }
      if (swiping && ev && ev.cancelable) ev.preventDefault();
    }
    function end(x) {
      if (startX === null) return;
      const dx = x - startX;
      const wasSwiping = swiping;
      startX = null; startY = null; swiping = false;
      if (!wasSwiping || Math.abs(dx) < THRESHOLD) return;
      setIdx(pagerIdx + (dx < 0 ? 1 : -1));
    }
    function resetSwipe() {
      startX = null; startY = null; swiping = false; swipeSource = null;
    }
    function bindSwipeSurface(el) {
      if (!el) return;
      el.addEventListener('touchstart', e => {
        if (e.target.closest('button, a, input, textarea, select')) return;
        const t = e.touches[0]; if (!t) return;
        swipeSource = el;
        start(t.clientX, t.clientY);
      }, { passive: true });
      el.addEventListener('touchmove', e => {
        if (swipeSource !== el) return;
        const t = e.touches[0]; if (!t) return;
        move(t.clientX, t.clientY, e);
      }, { passive: false });
      el.addEventListener('touchend', e => {
        if (swipeSource !== el) return;
        const t = e.changedTouches[0];
        end(t ? t.clientX : (startX || 0));
      });
      el.addEventListener('touchcancel', resetSwipe);
    }

    // 鼠标
    pagerRoot.addEventListener('mousedown', e => start(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => move(e.clientX, e.clientY, e));
    window.addEventListener('mouseup', e => end(e.clientX));

    // 触屏：main 区域左右滑动换页，底部分页条也保留可滑
    bindSwipeSurface(feedRoot);
    bindSwipeSurface(pagerRoot);
  })();

  document.getElementById('immerseScroll').addEventListener('click', e => {
    if (openLocalVideoFromCard(e)) return;

    const reveal = e.target.closest('[data-act="reveal"]');
    if (reveal) { reveal.classList.toggle('revealed'); vibe(5); return; }
    const t = e.target.closest('[data-act]');
    if (!t) return;
    const act = t.dataset.act, word = t.dataset.word;
    if (act === 'speak') { e.preventDefault(); e.stopPropagation(); speak(word); }
    else if (act === 'star') { e.preventDefault(); e.stopPropagation(); toggleStar(word); }
    else if (act === 'learn') { e.preventDefault(); e.stopPropagation(); toggleLearned(word); }
  });

  // 键盘快捷键
  document.addEventListener('keydown', e => {
    const im = document.getElementById('immerse');
    if (!im.classList.contains('open')) return;
    const scroll = document.getElementById('immerseScroll');
    const cur = Math.round(scroll.scrollTop / window.innerHeight);
    if (e.key === 'ArrowDown' || e.key === 'j' || e.key === ' ') {
      e.preventDefault();
      scroll.scrollTo({ top: (cur + 1) * window.innerHeight, behavior: 'smooth' });
    } else if (e.key === 'ArrowUp' || e.key === 'k') {
      e.preventDefault();
      scroll.scrollTo({ top: Math.max(0, cur - 1) * window.innerHeight, behavior: 'smooth' });
    } else if (e.key === 'Escape') closeImmerse();
    else if (e.key === 's') {
      const slide = scroll.children[cur];
      if (slide) toggleStar(slide.dataset.word);
    } else if (e.key === 'l' || e.key === 'Enter') {
      const slide = scroll.children[cur];
      if (slide) toggleLearned(slide.dataset.word);
    } else if (e.key === 'r') {
      const slide = scroll.children[cur];
      if (slide) speak(slide.dataset.word);
    }
  });

  render();

  // 进入网页/首次交互后自动全屏（iframe 内点击也能触发顶层窗口全屏）
  (function initAutoFullscreen() {
    function tryFullscreen() {
      try {
        const topDoc = window.top.document;
        if (topDoc.fullscreenElement || topDoc.webkitFullscreenElement) return;
        const el = window.top.document.documentElement;
        const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
        if (req) req.call(el).catch(() => {});
      } catch (_) {
        const el = document.documentElement;
        const req = el.requestFullscreen || el.webkitRequestFullscreen;
        if (req) req.call(el).catch(() => {});
      }
    }
    tryFullscreen();
    const trigger = () => {
      tryFullscreen();
      window.removeEventListener('pointerdown', trigger, true);
      window.removeEventListener('touchstart', trigger, true);
      window.removeEventListener('keydown', trigger, true);
    };
    window.addEventListener('pointerdown', trigger, true);
    window.addEventListener('touchstart', trigger, true);
    window.addEventListener('keydown', trigger, true);
  })();

  // 从背单词页继续向下滑：通知父页面无缝回到第一个视频
  (function initLoopToFirstVideo() {
    // 必须在 iframe 内才有意义
    if (!window.parent || window.parent === window) return;

    let cooling = false;
    function notifyParent() {
      if (cooling) return;
      cooling = true;
      try {
        window.parent.postMessage({ type: 'douyinDanci:loopToFirstVideo' }, '*');
      } catch (_) {}
      setTimeout(() => { cooling = false; }, 1200);
    }

    function isAtBottom() {
      // body / main 滚动容器；index.html 整体页面也算
      const scrollEl = document.scrollingElement || document.documentElement;
      const remain = scrollEl.scrollHeight - scrollEl.scrollTop - scrollEl.clientHeight;
      return remain <= 4;
    }

    // 触屏：在页面已经滚到最底时，再做一次向上滑动（dy<0）即触发
    let touchStartY = null;
    let triggered = false;
    window.addEventListener('touchstart', e => {
      const t = e.touches[0]; if (!t) return;
      touchStartY = t.clientY;
      triggered = false;
    }, { passive: true });
    window.addEventListener('touchmove', e => {
      if (touchStartY == null || triggered) return;
      const t = e.touches[0]; if (!t) return;
      const dy = t.clientY - touchStartY;
      // 手指向上滑（dy < 0）= 内容向上 = 想看"下一条"
      if (dy < -60 && isAtBottom()) {
        triggered = true;
        notifyParent();
      }
    }, { passive: true });
    window.addEventListener('touchend', () => { touchStartY = null; }, { passive: true });

    // 桌面鼠标滚轮：到底后再向下滚动也触发
    window.addEventListener('wheel', e => {
      if (e.deltaY > 30 && isAtBottom()) {
        notifyParent();
      }
    }, { passive: true });
  })();
</script>
