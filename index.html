<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0f" />
<title>背单词 · 短视频流</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lobster&family=Pacifico&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0d1620 url('bkgrd.jpg')
                center/cover fixed no-repeat;
    color: #ffffff;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
  }
  body {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1;
    background:
      linear-gradient(180deg,
        rgba(13, 22, 32, 0.55) 0%,
        rgba(13, 22, 32, 0.65) 50%,
        rgba(13, 22, 32, 0.78) 100%);
  }

  /* ============ Header ============ */
  header {
    position: relative; z-index: 20;
    background: transparent;
    padding: 18px 20px 16px;
    padding-top: calc(max(14px, env(safe-area-inset-top)) + 100px);
    border: none;
  }

  .title-row {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  header h1 {
    margin: 0;
    font-family: "Lobster", "Pacifico", "Monotype Corsiva", cursive;
    font-size: 24px; font-weight: 400;
    display: flex; align-items: center; gap: 8px;
    color: #ffffff;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
  }
  header h1::before {
    content: "✦";
    font-size: 14px;
    color: #ffffff;
    opacity: 0.85;
  }
  .header-actions { display: flex; gap: 6px; align-items: center; }
  .immerse-btn {
    background: transparent;
    border: none;
    padding: 6px;
    color: #ffffff;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform 0.15s, opacity 0.15s;
    opacity: 0.9;
  }
  .immerse-btn:hover { opacity: 1; }
  .immerse-btn:active { transform: scale(0.88); }
  .immerse-btn svg {
    display: block;
    filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.4));
  }

  /* Progress */
  .progress-bar {
    margin-top: 8px;
    display: flex; gap: 10px; align-items: center;
    font-size: 11px;
  }
  .progress-track {
    flex: 1;
    height: 5px;
    background: rgba(0,0,0,0.06);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #34c759, #5ce1a4);
    width: 0%; transition: width 0.5s ease;
  }
  .progress-text { color: #6b6b72; min-width: 70px; text-align: right; }

  .search-box {
    margin-top: 10px;
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,0,0,0.04);
    border-radius: 10px;
    padding: 7px 12px;
  }
  .search-box input {
    flex: 1; background: transparent; border: none; outline: none;
    color: #1a1a1f; font-size: 13.5px;
  }
  .search-box input::placeholder { color: #9a9aa0; }
  .search-icon { color: #8e8e93; font-size: 13px; }

  .tabs {
    display: flex; gap: 6px;
    margin-top: 10px; overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 14px;
    font-size: 12px;
    color: #5a5a62;
    background: rgba(0,0,0,0.04);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active {
    background: #1a1a1f; color: #fff; font-weight: 600;
  }

  /* ============ Feed (响应式: 手机单列, 平板自动多列并拉伸) ============ */
  .feed {
    --card-min: 360px;
    position: relative;
    display: flex;
    flex-direction: column-reverse;
    justify-content: flex-start;
    gap: 8px;
    padding: 200px max(12px, calc((100% - 1200px) / 2)) 20px;
    margin-top: -200px;
    background: transparent;
  }
  .feed > .card { position: relative; z-index: 2; }
  .feed > .empty { position: relative; z-index: 2; }
  @media (min-width: 640px) {
    .feed {
      gap: 10px;
      padding: 4px max(16px, calc((100% - 1200px) / 2)) 24px;
    }
  }
  .feed .card {
    width: 100%;
  }

  footer {
    position: relative;
    z-index: 5;
    background: rgba(13, 22, 32, 0.16);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .card {
    width: 100%;
    background: transparent;
    border-radius: 12px;
    overflow: hidden;
    border: none;
    display: flex; flex-direction: column;
    position: relative;
    animation: fadeIn 0.35s ease both;
    transition: transform 0.15s;
    color: #ffffff;
  }
  .card > * { position: relative; }
  .card:active { transform: scale(0.985); }
  .card.learned { opacity: 0.5; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-body {
    display: flex;
    gap: 10px;
    padding: 8px 10px;
    align-items: stretch;
  }
  .card-main {
    flex: 0 1 auto;
    min-width: 0;
    display: flex; flex-direction: column;
  }
  .card-main .sentence { flex: 1; }

  .word-line {
    display: flex; align-items: center; gap: 6px;
    width: 100%;
  }
  .word {
    font-family: "Lobster", "Pacifico", "Monotype Corsiva", "Brush Script MT", cursive;
    font-size: 30px; font-weight: 400;
    color: #ffffff; letter-spacing: 0.5px;
    line-height: 1.2;
    flex: 0 1 auto;
    min-width: 0;
    word-break: break-word;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
  }
  .icon-btn {
    background: transparent;
    border: none;
    padding: 0;
    width: 28px; height: 28px;
    flex: 0 0 28px;
    border-radius: 0;
    color: rgba(255, 255, 255, 0.85);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: color 0.15s, opacity 0.15s, transform 0.15s;
  }
  .icon-btn:hover { color: #ffffff; }
  .icon-btn:active { transform: scale(0.88); }
  .icon-btn svg { display: block; }
  .icon-btn.active { color: #ffd60a; }
  .icon-btn.learned-btn.active { color: #34c759; }
  .speak-btn {
    background: transparent;
    border: none;
    padding: 0;
    width: 28px; height: 28px;
    color: rgba(255, 255, 255, 0.85);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .word-line .speak-btn {
    flex: 0 0 28px;
    margin-left: 0;
  }
  .word-line .learned-btn { margin-left: auto; }
  .speak-btn:active { transform: scale(0.88); }
  .speak-btn svg { display: block; }

  /* 视频：底部横向小卡片（封面 + 标题/来源） */
  .video-link {
    text-decoration: none; color: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 2px 10px 6px;
    padding: 2px 4px;
    border-radius: 6px;
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.08);
    align-self: flex-start;
    max-width: calc(100% - 20px);
  }
  .cover-wrap {
    position: relative;
    flex: 0 0 20px;
    width: 20px;
    height: 20px;
    border-radius: 3px;
    overflow: hidden;
    background: linear-gradient(135deg, #d8d8de, #c8c8d0);
  }
  .video-info {
    flex: 0 1 auto;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .video-source {
    flex-shrink: 0;
    font-size: 9px;
    color: rgba(255, 255, 255, 0.55);
    line-height: 1.2;
  }
  .cover-wrap.loading::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(90deg, #d8d8de 0%, #e8e8ee 50%, #d8d8de 100%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .video-cover {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    opacity: 0; transition: opacity 0.3s;
  }
  .video-cover.loaded { opacity: 1; }
  .video-title {
    font-size: 11px; line-height: 1.25;
    color: #fff; font-weight: 500;
    display: -webkit-box; -webkit-line-clamp: 1;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  .meaning {
    font-size: 12px; color: #ffffff;
    margin-top: 3px; font-weight: 500;
    line-height: 1.3;
    opacity: 0.92;
  }

  .sentence {
    padding: 0;
    margin-top: 3px;
    font-size: 11.5px; line-height: 1.4;
  }
  .sentence .en {
    color: #ffffff; font-weight: 500;
    opacity: 0.88;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .hl {
    color: #ffe88a; font-weight: 700;
    background: rgba(255, 214, 10, 0.25);
    padding: 0 3px; border-radius: 3px;
  }
  /* 翻译遮罩 - 鼓励先想 */
  .cn-wrap {
    position: relative;
    margin-top: 2px;
    cursor: pointer;
    user-select: none;
    min-height: 15px;
  }
  .cn {
    color: #ffffff; font-size: 11px;
    opacity: 0.72;
    transition: filter 0.25s;
    filter: blur(5px);
    display: -webkit-box; -webkit-line-clamp: 1;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .cn-wrap.revealed .cn {
    filter: blur(0);
    -webkit-line-clamp: 2;
  }
  .cn-hint {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: flex-start;
    font-size: 9.5px; color: rgba(255, 255, 255, 0.55);
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .cn-wrap.revealed .cn-hint { opacity: 0; }

  .empty { text-align: center; padding: 60px 20px; color: rgba(255, 255, 255, 0.6); grid-column: 1 / -1; }
  .empty .icon { font-size: 36px; margin-bottom: 8px; }
  .empty .text { font-size: 13px; }

  footer {
    text-align: center; color: rgba(255, 255, 255, 0.5); font-size: 11px;
    padding: 8px 0 calc(100px + env(safe-area-inset-bottom));
  }

  .toast {
    position: fixed; left: 50%; bottom: 80px;
    transform: translateX(-50%) translateY(20px);
    background: rgba(255,255,255,0.95);
    color: #0a0a0f;
    padding: 8px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    opacity: 0; pointer-events: none;
    transition: all 0.25s; z-index: 60;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ============ 沉浸式滑动模式 ============ */
  .immerse {
    position: fixed; inset: 0; z-index: 50;
    background: #000;
    display: none;
    flex-direction: column;
  }
  .immerse.open { display: flex; }
  .immerse-header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
    z-index: 5;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(0,0,0,0.6), transparent);
  }
  .close-btn {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
  }
  .immerse-pos {
    color: #fff; font-size: 13px; font-weight: 500;
    background: rgba(0,0,0,0.4);
    padding: 6px 12px; border-radius: 14px;
  }
  .immerse-scroll {
    flex: 1;
    overflow-y: auto;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
  }
  .immerse-scroll::-webkit-scrollbar { display: none; }
  .slide {
    height: 100dvh;
    width: 100%;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 80px 24px 100px;
    position: relative;
    overflow: hidden;
  }
  .slide::before {
    content: ""; position: absolute; inset: 0;
    background: var(--grad);
    opacity: 0.85; z-index: 0;
  }
  .slide::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.25) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.7) 100%);
    z-index: 1;
  }
  .slide > * { position: relative; z-index: 2; }
  .slide .word {
    font-size: 56px; font-weight: 400;
    letter-spacing: 1.5px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.4);
    word-break: break-word;
  }
  .slide .word-meta { margin-top: 8px; gap: 12px; }
  .slide .phonetic { font-size: 14px; }
  .slide .speak-btn { width: 30px; height: 30px; font-size: 14px; }
  .slide .meaning {
    font-size: 17px; margin-top: 14px;
    font-weight: 600;
  }
  .slide-sentence {
    margin-top: 28px;
    font-size: 16px; line-height: 1.6;
  }
  .slide-sentence .en { color: #fff; }
  .slide-sentence .cn {
    color: rgba(255,255,255,0.85);
    font-size: 14px; margin-top: 8px;
    transition: filter 0.25s; filter: blur(8px);
  }
  .slide-sentence.revealed .cn { filter: blur(0); }
  .slide-sentence .hl {
    background: rgba(255,214,10,0.3);
    color: #fff7c2;
  }
  .slide-video {
    position: absolute;
    bottom: calc(24px + env(safe-area-inset-bottom));
    left: 16px; right: 16px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px;
    display: flex; align-items: center; gap: 10px;
    text-decoration: none; color: #fff;
    z-index: 3;
  }
  .slide-video .cover-wrap { width: 54px; height: 54px; }
  .slide-video .video-title { font-size: 13px; color: #fff; }
  .slide-video .video-source { color: rgba(255,255,255,0.65); }

  .slide-actions {
    position: absolute;
    right: 14px;
    bottom: calc(110px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 14px;
    z-index: 4;
  }
  .slide-actions button {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    width: 46px; height: 46px; border-radius: 50%;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .slide-actions button.active { background: #ffd60a; color: #0a0a0f; border-color: #ffd60a; }
  .slide-actions button.learned-btn.active { background: #34c759; color: #fff; border-color: #34c759; }

  .hint-swipe {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    animation: bob 1.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes bob {
    0%, 100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -6px); }
  }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1>似曾相识？</h1>
    <div class="header-actions">
      <button class="immerse-btn" id="openImmerse" aria-label="沉浸模式" hidden style="display:none;">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 9 V4 H9"></path>
          <path d="M20 9 V4 H15"></path>
          <path d="M4 15 V20 H9"></path>
          <path d="M20 15 V20 H15"></path>
        </svg>
      </button>
    </div>
  </div>
</header>

<main class="feed" id="feed"></main>

<footer id="footer">— 点击右上角进入沉浸式滑动 —</footer>

<div class="toast" id="toast"></div>

<!-- 沉浸式模式 -->
<div class="immerse" id="immerse">
  <div class="immerse-header">
    <button class="close-btn" id="closeImmerse">✕</button>
    <div class="immerse-pos" id="immersePos">1 / 1</div>
  </div>
  <div class="immerse-scroll" id="immerseScroll"></div>
</div>

<script>
  const WORDS = [
    { word: "serendipity", level: "IELTS", phonetic: "/ˌserənˈdɪpəti/", meaning: "n. 意外发现美好事物的能力",
      en: "Meeting you here was pure serendipity.",
      cn: "在这里遇见你完全是意外的惊喜。",
      videoTitle: "Top 10 beautiful English words you should know",
      source: "TED-Ed", timestamp: "2:14",
      cover: "https://picsum.photos/seed/sere/160",
      url: "https://www.youtube.com/results?search_query=serendipity+meaning" },
    { word: "ephemeral", level: "IELTS", phonetic: "/ɪˈfemərəl/", meaning: "adj. 短暂的，转瞬即逝的",
      en: "Fame in the digital age is ephemeral.",
      cn: "数字时代的名声是转瞬即逝的。",
      videoTitle: "Why everything feels ephemeral now",
      source: "TED-Ed", timestamp: "4:02",
      cover: "https://picsum.photos/seed/eph/160",
      url: "https://www.youtube.com/results?search_query=ephemeral" },
    { word: "ubiquitous", level: "CET6", phonetic: "/juːˈbɪkwɪtəs/", meaning: "adj. 无处不在的",
      en: "Smartphones have become ubiquitous in modern life.",
      cn: "智能手机在现代生活中已无处不在。",
      videoTitle: "How smartphones became ubiquitous in 10 years",
      source: "Vox", timestamp: "0:48",
      cover: "https://picsum.photos/seed/ubi/160",
      url: "https://www.youtube.com/results?search_query=ubiquitous" },

  ];

  const PALETTES = [
    "linear-gradient(135deg, #ff6b6b, #ee4d8d)",
    "linear-gradient(135deg, #667eea, #764ba2)",
    "linear-gradient(135deg, #f093fb, #f5576c)",
    "linear-gradient(135deg, #4facfe, #00f2fe)",
    "linear-gradient(135deg, #43e97b, #38f9d7)",
    "linear-gradient(135deg, #fa709a, #fee140)",
    "linear-gradient(135deg, #30cfd0, #330867)",
    "linear-gradient(135deg, #a8edea, #fed6e3)",
    "linear-gradient(135deg, #ff9a9e, #fad0c4)",
    "linear-gradient(135deg, #c471f5, #fa71cd)",
    "linear-gradient(135deg, #48c6ef, #6f86d6)",
    "linear-gradient(135deg, #f6d365, #fda085)"
  ];
  function hashGrad(word) {
    let h = 0;
    for (let i = 0; i < word.length; i++) h = (h * 31 + word.charCodeAt(i)) >>> 0;
    return PALETTES[h % PALETTES.length];
  }

  const STORE_KEY = 'wordVideoApp/v3';
  const state = JSON.parse(localStorage.getItem(STORE_KEY) || '{"starred":[],"learned":[]}');
  let currentFilter = 'all';
  let currentSearch = '';

  function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  function vibe(ms = 8) { if (navigator.vibrate) navigator.vibrate(ms); }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function highlight(text, word) {
    const re = new RegExp(`(${word.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\$&')})`, 'gi');
    return text.replace(re, '<span class="hl">$1</span>');
  }

  function speak(word) {
    if (!('speechSynthesis' in window)) { showToast('该浏览器不支持发音'); return; }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang = 'en-US'; u.rate = 0.9;
    speechSynthesis.speak(u);
  }

  function toggleStar(word) {
    const i = state.starred.indexOf(word);
    if (i >= 0) { state.starred.splice(i, 1); showToast('已取消收藏'); }
    else { state.starred.push(word); showToast('⭐ 已收藏'); }
    vibe(10); save(); render(); refreshImmerseSlide(word);
  }

  function toggleLearned(word) {
    const i = state.learned.indexOf(word);
    if (i >= 0) { state.learned.splice(i, 1); showToast('标记为未学'); }
    else { state.learned.push(word); showToast('✓ 已学会'); }
    vibe(10); save(); render(); refreshImmerseSlide(word);
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1400);
  }

  function getFiltered() {
    let list = WORDS;
    const levelFilters = ['CET4','CET6','IELTS'];
    if (currentFilter === 'starred') list = list.filter(w => state.starred.includes(w.word));
    else if (currentFilter === 'learned') list = list.filter(w => state.learned.includes(w.word));
    else if (currentFilter === 'unlearned') list = list.filter(w => !state.learned.includes(w.word));
    else if (levelFilters.includes(currentFilter)) list = list.filter(w => w.level === currentFilter);
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      list = list.filter(w =>
        w.word.toLowerCase().includes(q) ||
        w.meaning.toLowerCase().includes(q) ||
        w.en.toLowerCase().includes(q)
      );
    }
    return list;
  }

  function updateProgress() {
    const total = WORDS.length;
    const learned = state.learned.length;
    const pt = document.getElementById('progressText');
    const pf = document.getElementById('progressFill');
    if (pt) pt.textContent = `${learned} / ${total} 已学`;
    if (pf) pf.style.width = `${(learned / total) * 100}%`;
  }

  function cardHTML(w) {
    const starred = state.starred.includes(w.word);
    const learned = state.learned.includes(w.word);
    const grad = hashGrad(w.word);
    return `
      <article class="card ${learned ? 'learned' : ''}" style="--grad: ${grad}" data-word="${escapeHtml(w.word)}">
        <div class="card-body">
          <div class="card-main">
            <div class="word-line">
              <div class="word">${escapeHtml(w.word)}</div>
              <button class="icon-btn speak-btn" data-act="speak" data-word="${escapeHtml(w.word)}" aria-label="朗读" title="朗读">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M4 9v6h4l5 4V5L8 9H4z"></path>
                  <path d="M16 9.5a4 4 0 0 1 0 5"></path>
                  <path d="M18.5 7a7.5 7.5 0 0 1 0 10"></path>
                </svg>
              </button>
              <button class="icon-btn learned-btn ${learned ? 'active' : ''}" data-act="learn" data-word="${escapeHtml(w.word)}" aria-label="已学会" title="已学会">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="12" cy="12" r="9"></circle>
                  <path d="M8 12.2l2.5 2.5L16.5 9"></path>
                </svg>
              </button>
              <button class="icon-btn ${starred ? 'active' : ''}" data-act="star" data-word="${escapeHtml(w.word)}" aria-label="收藏" title="收藏">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="${starred ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M12 2.8l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 17.6l-5.8 3.1 1.1-6.5-4.7-4.6 6.5-.9L12 2.8z"></path>
                </svg>
              </button>
            </div>
            <div class="meaning">${escapeHtml(w.meaning)}</div>
            <div class="sentence">
              <div class="en">${highlight(escapeHtml(w.en), w.word)}</div>
              <div class="cn-wrap" data-act="reveal">
                <div class="cn">${escapeHtml(w.cn)}</div>
                <div class="cn-hint">点击显示翻译</div>
              </div>
            </div>
          </div>
        </div>
        <a class="video-link" href="${w.url}" target="_blank" rel="noopener">
          <div class="cover-wrap loading">
            <img class="video-cover" src="${w.cover}" alt="" loading="lazy"
                 onload="this.classList.add('loaded');this.parentNode.classList.remove('loading')"
                 onerror="this.parentNode.classList.remove('loading')" />
          </div>
          <div class="video-info">
            <div class="video-title">${escapeHtml(w.videoTitle)}</div>
            <div class="video-source">${escapeHtml(w.source || '')}${w.timestamp ? ' · ' + escapeHtml(w.timestamp) : ''}</div>
          </div>
        </a>
      </article>`;
  }

  function render() {
    const feed = document.getElementById('feed');
    const list = getFiltered();
    updateProgress();

    if (list.length === 0) {
      feed.innerHTML = `<div class="empty"><div class="icon">🔍</div><div class="text">没有匹配的单词</div></div>`;
      document.getElementById('footer').style.display = 'none';
      return;
    }
    document.getElementById('footer').style.display = '';
    feed.innerHTML = list.map(cardHTML).join('');
  }

  // 事件代理 - feed
  document.getElementById('feed').addEventListener('click', e => {
    const reveal = e.target.closest('[data-act="reveal"]');
    if (reveal) { reveal.classList.toggle('revealed'); vibe(5); return; }

    const t = e.target.closest('[data-act]');
    if (!t) return;
    const act = t.dataset.act;
    const word = t.dataset.word;
    if (act === 'speak') { e.preventDefault(); e.stopPropagation(); speak(word); }
    else if (act === 'star') { e.preventDefault(); e.stopPropagation(); toggleStar(word); }
    else if (act === 'learn') { e.preventDefault(); e.stopPropagation(); toggleLearned(word); }
  });

  document.getElementById('tabs')?.addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    render();
  });

  document.getElementById('searchInput')?.addEventListener('input', e => {
    currentSearch = e.target.value.trim();
    render();
  });

  // ============ 沉浸式模式 ============
  function slideHTML(w, idx) {
    const starred = state.starred.includes(w.word);
    const learned = state.learned.includes(w.word);
    const grad = hashGrad(w.word);
    return `
      <section class="slide" style="--grad: ${grad}" data-word="${escapeHtml(w.word)}" data-idx="${idx}">
        <div class="word">${escapeHtml(w.word)}</div>
        <div class="word-meta">
          <span class="phonetic">${escapeHtml(w.phonetic)}</span>
          <button class="speak-btn" data-act="speak" data-word="${escapeHtml(w.word)}">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 9v6h4l5 4V5L8 9H4z"></path>
              <path d="M16 9.5a4 4 0 0 1 0 5"></path>
              <path d="M18.5 7a7.5 7.5 0 0 1 0 10"></path>
            </svg>
          </button>
        </div>
        <div class="meaning">${escapeHtml(w.meaning)}</div>
        <div class="slide-sentence" data-act="reveal">
          <div class="en">${highlight(escapeHtml(w.en), w.word)}</div>
          <div class="cn">${escapeHtml(w.cn)}　<span style="font-size:11px;opacity:.6;">(点击切换)</span></div>
        </div>
        <div class="slide-actions">
          <button data-act="star" data-word="${escapeHtml(w.word)}" class="${starred ? 'active' : ''}">${starred ? '★' : '☆'}</button>
          <button data-act="learn" data-word="${escapeHtml(w.word)}" class="learned-btn ${learned ? 'active' : ''}">${learned ? '✓' : '○'}</button>
        </div>
        <a class="slide-video" href="${w.url}" target="_blank" rel="noopener">
          <div class="cover-wrap loading">
            <img class="video-cover" src="${w.cover}" alt="" loading="lazy"
                 onload="this.classList.add('loaded');this.parentNode.classList.remove('loading')" />
            <div class="play-overlay">▶</div>
          </div>
          <div class="video-info">
            <div class="video-title">${escapeHtml(w.videoTitle)}</div>
            <div class="video-source">📺 ${escapeHtml(w.source)} · 点击观看</div>
          </div>
        </a>
        ${idx === 0 ? '<div class="hint-swipe">⬆ 上滑切换下一个</div>' : ''}
      </section>`;
  }

  function refreshImmerseSlide(word) {
    const im = document.getElementById('immerse');
    if (!im.classList.contains('open')) return;
    const slide = im.querySelector(`.slide[data-word="${CSS.escape(word)}"]`);
    if (!slide) return;
    const starBtn = slide.querySelector('[data-act="star"]');
    const learnBtn = slide.querySelector('[data-act="learn"]');
    if (starBtn) {
      const s = state.starred.includes(word);
      starBtn.classList.toggle('active', s);
      starBtn.textContent = s ? '★' : '☆';
    }
    if (learnBtn) {
      const l = state.learned.includes(word);
      learnBtn.classList.toggle('active', l);
      learnBtn.textContent = l ? '✓' : '○';
    }
  }

  function openImmerse() {
    const list = getFiltered();
    if (!list.length) { showToast('没有可学习的单词'); return; }
    const scroll = document.getElementById('immerseScroll');
    scroll.innerHTML = list.map((w, i) => slideHTML(w, i)).join('');
    document.getElementById('immerse').classList.add('open');
    document.body.style.overflow = 'hidden';
    updateImmersePos(0, list.length);
    speak(list[0].word);

    // 滚动监听 - 更新位置 + 自动朗读
    let timer = null;
    scroll.onscroll = () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        const idx = Math.round(scroll.scrollTop / window.innerHeight);
        updateImmersePos(idx, list.length);
        if (list[idx]) { vibe(5); speak(list[idx].word); }
      }, 120);
    };
  }
  function closeImmerse() {
    document.getElementById('immerse').classList.remove('open');
    document.body.style.overflow = '';
    speechSynthesis.cancel();
  }
  function updateImmersePos(i, total) {
    const el = document.getElementById('immersePos');
    if (el) el.textContent = `${i + 1} / ${total}`;
  }

  document.getElementById('openImmerse')?.addEventListener('click', openImmerse);
  document.getElementById('closeImmerse')?.addEventListener('click', closeImmerse);

  document.getElementById('immerseScroll').addEventListener('click', e => {
    const reveal = e.target.closest('[data-act="reveal"]');
    if (reveal) { reveal.classList.toggle('revealed'); vibe(5); return; }
    const t = e.target.closest('[data-act]');
    if (!t) return;
    const act = t.dataset.act, word = t.dataset.word;
    if (act === 'speak') { e.preventDefault(); e.stopPropagation(); speak(word); }
    else if (act === 'star') { e.preventDefault(); e.stopPropagation(); toggleStar(word); }
    else if (act === 'learn') { e.preventDefault(); e.stopPropagation(); toggleLearned(word); }
  });

  // 键盘快捷键
  document.addEventListener('keydown', e => {
    const im = document.getElementById('immerse');
    if (!im.classList.contains('open')) return;
    const scroll = document.getElementById('immerseScroll');
    const cur = Math.round(scroll.scrollTop / window.innerHeight);
    if (e.key === 'ArrowDown' || e.key === 'j' || e.key === ' ') {
      e.preventDefault();
      scroll.scrollTo({ top: (cur + 1) * window.innerHeight, behavior: 'smooth' });
    } else if (e.key === 'ArrowUp' || e.key === 'k') {
      e.preventDefault();
      scroll.scrollTo({ top: Math.max(0, cur - 1) * window.innerHeight, behavior: 'smooth' });
    } else if (e.key === 'Escape') closeImmerse();
    else if (e.key === 's') {
      const slide = scroll.children[cur];
      if (slide) toggleStar(slide.dataset.word);
    } else if (e.key === 'l' || e.key === 'Enter') {
      const slide = scroll.children[cur];
      if (slide) toggleLearned(slide.dataset.word);
    } else if (e.key === 'r') {
      const slide = scroll.children[cur];
      if (slide) speak(slide.dataset.word);
    }
  });

  render();
</script>
</body>
</html>
