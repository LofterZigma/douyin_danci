<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>想做网红菜？</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  }
  /* 用 vmin 做响应式：以视口较短边为基准，保证手机/平板/桌面都协调 */
  :root {
    --unit: 1vmin;
  }

  .page {
    width: 100vw;
    height: 100vh;
    height: 100dvh; /* 适配移动端浏览器地址栏 */
    background: linear-gradient(180deg, #FFF9F0 0%, #FFF1E0 50%, #FFE4CC 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 4vmin;
  }

  /* 装饰背景圆 —— 用 vmax 让其在大屏也能撑住 */
  .deco {
    position: absolute;
    border-radius: 50%;
    opacity: 0.5;
    pointer-events: none;
  }
  .deco-1 { width: 32vmax; height: 32vmax; background: #FFE2B8; top: -8vmax; left: -10vmax; }
  .deco-2 { width: 22vmax; height: 22vmax; background: #FFD1A8; top: 6vmax;  right: -8vmax; }
  .deco-3 { width: 18vmax; height: 18vmax; background: #FFE8C8; bottom: 18vmax; left: 4vmax; }
  .deco-4 { width: 28vmax; height: 28vmax; background: #FFDAB0; bottom: -6vmax; right: -8vmax; }

  /* 内容容器 */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 720px;
  }

  /* emoji 主视觉 */
  .emoji-wrap {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    line-height: 1;
  }
  .emoji {
    /* 在小屏与大屏之间平滑缩放，限制上下限 */
    font-size: clamp(140px, 42vmin, 420px);
    line-height: 1;
    transform-origin: 50% 0%; /* 以头顶为支点 */
    animation: swing 2.2s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes swing {
    0%   { transform: rotate(-8deg); }
    50%  { transform: rotate(8deg); }
    100% { transform: rotate(-8deg); }
  }

  /* 标题 */
  .title {
    margin-top: clamp(40px, 6vmin, 96px);
    font-size: clamp(36px, 8vmin, 96px);
    font-weight: 800;
    color: #3D2A1A;
    letter-spacing: 0.08em;
    text-shadow: 0 4px 0 rgba(255, 255, 255, 0.6);
    text-align: center;
  }
  .subtitle {
    margin-top: clamp(10px, 1.6vmin, 28px);
    font-size: clamp(14px, 2.6vmin, 36px);
    color: #A07A55;
    letter-spacing: 0.12em;
    text-align: center;
  }

  /* 按钮 */
  .btn {
    margin-top: clamp(40px, 7vmin, 120px);
    width: clamp(220px, 56vmin, 560px);
    height: clamp(56px, 14vmin, 150px);
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #FF8A3D 0%, #FF5E2B 100%);
    color: #fff;
    font-size: clamp(20px, 4.6vmin, 56px);
    font-weight: 700;
    letter-spacing: 0.16em;
    cursor: pointer;
    box-shadow: 0 1.6vmin 3.2vmin rgba(255, 94, 43, 0.35),
                inset 0 -0.6vmin 0 rgba(0, 0, 0, 0.08);
    animation: pulse 1.8s ease-in-out infinite;
    transition: transform 0.15s ease;
  }
  .btn:active {
    transform: scale(0.97);
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }

  /* 横屏 / 宽屏布局微调：emoji 与文字横向排布更舒服 */
  @media (orientation: landscape) and (min-aspect-ratio: 4/3) {
    .content {
      flex-direction: row;
      max-width: 1200px;
      gap: 6vmin;
      align-items: center;
      justify-content: center;
    }
    .text-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .title, .subtitle { text-align: left; }
    .title { margin-top: 0; }
    .emoji { font-size: clamp(160px, 48vmin, 460px); }
  }

  /* 减少动画偏好的用户 */
  @media (prefers-reduced-motion: reduce) {
    .emoji, .btn { animation: none; }
  }
</style>
</head>
<body>
  <div class="page">
    <div class="deco deco-1"></div>
    <div class="deco deco-2"></div>
    <div class="deco deco-3"></div>
    <div class="deco deco-4"></div>

    <div class="content">
      <div class="emoji-wrap">
        <span class="emoji">😋</span>
      </div>
      <div class="text-block">
        <div class="title">想做网红菜？</div>
        <div class="subtitle">人人都能成为美食家</div>
        <button class="btn">想做就来学</button>
      </div>
    </div>
  </div>
</body>
</html>
